name: CI

on:
  push:
    branches:
      - main
      - chore/**
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: fastapi_app
          POSTGRES_PASSWORD: fastapi_password
          POSTGRES_DB: fastapi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fastapi_app -d fastapi_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PROJECT_NAME: FastAPI Users & Products JWT API
      VERSION: 1.0.0
      DEBUG: "false"
      ENVIRONMENT: ci
      API_V1_STR: /api/v1

      POSTGRES_USER: fastapi_app
      POSTGRES_PASSWORD: fastapi_password
      POSTGRES_DB: fastapi_db
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

      APP_PORT: 8000

      SECRET_KEY: ci-secret-key-for-tests-only
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      DEFAULT_PAGE_SIZE: 10
      MAX_PAGE_SIZE: 100
      BACKEND_CORS_ORIGINS: '["http://localhost:8000","http://localhost:5173"]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/unit tests/integration -q