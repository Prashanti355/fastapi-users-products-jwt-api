name: CI

on:
  push:
    branches:
      - main
      - chore/**
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: fastapi_app
          POSTGRES_PASSWORD: fastapi_password
          POSTGRES_DB: fastapi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fastapi_app -d fastapi_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PROJECT_NAME: FastAPI Users & Products JWT API
      VERSION: 1.0.0
      DEBUG: "false"
      ENVIRONMENT: testing
      API_V1_STR: /api/v1

      POSTGRES_USER: fastapi_app
      POSTGRES_PASSWORD: fastapi_password
      POSTGRES_DB: fastapi_db
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

      DATABASE_URL: postgresql+asyncpg://fastapi_app:fastapi_password@127.0.0.1:5432/fastapi_db

      APP_PORT: 8000

      SECRET_KEY: ci-secret-key-with-at-least-32-characters
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      DEFAULT_PAGE_SIZE: 10
      MAX_PAGE_SIZE: 100
      BACKEND_CORS_ORIGINS: '["http://localhost:8000","http://localhost:5173"]'

      PYTHONPATH: .
      LOG_DIR: logs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run database migrations
        run: alembic upgrade head

      - name: Verify schema after migrations
        run: |
          python - <<'PY'
          import asyncio
          from sqlalchemy import text
          from app.core.database import engine

          async def main():
              async with engine.begin() as conn:
                  result = await conn.execute(
                      text("SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename;")
                  )
                  tables = [row[0] for row in result]
                  print("Tables in public schema:", tables)

                  required = {"alembic_version", "audit_logs", "products", "users"}
                  missing = required - set(tables)
                  if missing:
                      raise SystemExit(f"Missing tables after migrations: {sorted(missing)}")

          asyncio.run(main())
          PY

      - name: Run tests
        run: python -m pytest tests/unit tests/integration -q