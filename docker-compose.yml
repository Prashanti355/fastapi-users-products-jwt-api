services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  api:
    build:
      context: .
      dockerfile: ./docker/fastapi/Dockerfile
      args:
        INSTALL_DEV: "true"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "${APP_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/home/python/app
      - ./tests:/home/python/tests
      - ./pytest.ini:/home/python/pytest.ini
      - ./logs:/home/python/logs
      - ./alembic:/home/python/alembic
      - ./alembic.ini:/home/python/alembic.ini
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - backend_network

volumes:
  postgres_data:

networks:
  backend_network:
    driver: bridge